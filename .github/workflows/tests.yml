name: Tests

on:
  pull_request:

jobs:
  test-core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/scrawn
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.2"

      - name: Install
        run: bun install

      - name: Type check
        run: bunx tsc --noEmit

      - name: Tests
        run: bun run test

  test-analytics:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/analytics
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.2"

      - name: Install
        run: bun install

      - name: Type check
        run: bunx tsc --noEmit
